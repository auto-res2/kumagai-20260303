# Main configuration for Hydra
# This file will be populated by AI code generator based on experimental design

defaults:
  - _self_
  - run: ???  # loads from config/run/, accessible as 'run=' in CLI

# Execution mode: main, sanity_check, or pilot
mode: main

# Results output directory
results_dir: .research/results

# WandB configuration
wandb:
  entity: airas
  project: kumagai
  mode: online

# Cache directory for models and datasets
cache_dir: .cache/

# LLM configuration
llm:
  provider: openai  # openai or anthropic
  model: gpt-4o-mini  # affordable model for math reasoning
  max_tokens: 2048
  temperature: 0.0  # deterministic for reproducibility
  timeout: 60
